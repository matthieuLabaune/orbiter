services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: orbiter
      DB_USERNAME: orbiter
      DB_PASSWORD: orbiter
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
    networks:
      - orbiter

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orbiter
      POSTGRES_USER: orbiter
      POSTGRES_PASSWORD: orbiter
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbiter"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - orbiter

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - orbiter

volumes:
  pgdata:

networks:
  orbiter:
    driver: bridge
